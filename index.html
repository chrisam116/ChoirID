<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة استخراج أكواد الكورال</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ecf0f1;
            padding: 15px;
        }
        .portal-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            color: #2c3e50;
            max-width: 480px;
            width: 100%;
        }
        .qr-img {
            max-width: 200px;
            border: 2px solid #3498db;
            border-radius: 15px;
            padding: 10px;
            background: #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .info-text {
            font-size: 0.85rem;
            font-style: italic;
            opacity: 0.8;
            margin-top: 20px;
            color: #7f8c8d;
            line-height: 1.5;
        }
        h3 {
            color: #2980b9;
            font-weight: 700;
        }
        .btn-primary {
            background-color: #2980b9;
            border: none;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background-color: #34495e;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="portal-card text-center">
    <h3 class="mb-4">بوابة استخراج الأكواد</h3>
    <p class="text-muted small mb-4">أدخل اسمك (ثنائياً أو ثلاثياً) أو رقم الموبايل للحصول على كود الحضور</p>
    
    <div class="mb-4">
        <!-- دعم البحث برقم التليفون أو الاسم -->
        <input type="text" id="searchInput" class="form-control form-control-lg text-center shadow-sm" placeholder="اكتب اسمك أو رقم موبايلك...">
    </div>
    <button onclick="searchStudent()" class="btn btn-primary btn-lg w-100 mb-4 shadow-sm">بحث واستخراج 🔍</button>

    <!-- منطقة عرض النتيجة -->
    <div id="resultArea" style="display: none;">
        <h4 id="studentName" style="color: #2c3e50; font-weight: 600;" class="mb-2"></h4>
        <p class="text-muted mb-4">كود الحضور: <strong id="studentID" style="color: #e74c3c; font-size: 1.3rem;"></strong></p>
        <div class="mb-4">
            <img id="qrImage" src="" class="qr-img" alt="QR Code">
        </div>
        <button id="downloadBtn" class="btn btn-success w-100 shadow-sm mb-3">تحميل صورة الـ QR 📥</button>
        
        <!-- السطر الإيطاليك الخفيف -->
        <p class="info-text">
            * رجاءً الاحتفاظ بهذه الصورة في مكان سهل الوصول إليه على موبايلك، فالكود والـ QR كود هما هويتك الأساسية في الكورال ويجب إظهارهما عند باب القاعة في كل بروفة.
        </p>
    </div>
</div>

<script>
    let studentsDatabase = [];

    // جلب ملف JSON من الريبو الجديد
    fetch('data.json')
        .then(response => response.json())
        .then(data => {
            studentsDatabase = data;
        })
        .catch(err => console.error("Error loading student database:", err));

    function normalizeArabic(text) {
        if (!text) return "";
        return String(text)
            .replace(/[أإآا]/g, 'ا')
            .replace(/[ىي]/g, 'ي')
            .replace(/[ةه]/g, 'ه')
            .replace(/[\u064B-\u0652]/g, '') // إزالة التشكيل
            .trim()
            .toLowerCase();
    }

    function searchStudent() {
        const rawInput = document.getElementById('searchInput').value.trim();
        const query = normalizeArabic(rawInput);
        const resultArea = document.getElementById('resultArea');
        
        if (!query) {
            alert("من فضلك اكتب الاسم أو رقم التليفون أولاً");
            return;
        }

        let found;

        // لو المدخل أرقام فقط، يبحث برقم الموبايل
        if (/^\d+$/.test(rawInput)) {
            // تنظيف الرقم من الصفر الشمال أو كود الدولة للتطابق
            const cleanInput = rawInput.replace(/^0/, '').replace(/^20/, '');
            found = studentsDatabase.find(student => {
                const cleanPhone = String(student.phone).replace(/^0/, '').replace(/^20/, '');
                return cleanPhone.includes(cleanInput);
            });
        } else {
            // البحث الذكي بالاسم الثنائي أو الثلاثي
            const queryWords = query.split(" ");
            found = studentsDatabase.find(student => {
                const normalizedStudentName = normalizeArabic(student.name);
                return queryWords.every(word => normalizedStudentName.includes(word));
            });
        }

        if (found) {
            document.getElementById('studentName').innerText = found.name;
            document.getElementById('studentID').innerText = found.id;
            
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${found.id}`;
            document.getElementById('qrImage').src = qrUrl;
            
            document.getElementById('downloadBtn').onclick = function() {
                downloadQR(qrUrl, `${found.name}_QR.png`);
            };

            resultArea.style.display = 'block';
        } else {
            alert("البيانات غير مسجلة، يرجى التأكد من كتابة الاسم أو الرقم صحيحاً.");
            resultArea.style.display = 'none';
        }
    }

    async function downloadQR(url, filename) {
        try {
            const response = await fetch(url);
            const blob = await response.blob();
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
        } catch (error) {
            console.error("Download failed:", error);
        }
    }
</script>

</body>
</html>
